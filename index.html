<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analizador de Facturas Ecuador</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0e0e16;color:#e8e8f0;font-family:system-ui,sans-serif}
    header{background:#16161f;border-bottom:1px solid #2a2a3a;padding:18px 16px}
    header h1{font-size:1.3rem;font-weight:bold;color:#f0c040}
    header p{font-size:0.78rem;color:#7070a0;margin-top:3px}
    main{padding:18px 16px;max-width:560px;margin:0 auto}
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;background:#fff;color:#111;border:none;border-radius:14px;padding:18px 16px;font-size:1rem;font-weight:bold;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 20px #00000033}
    .btn-drive{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#f0c040;color:#111;border:none;border-radius:14px;padding:20px 16px;font-size:1.05rem;font-weight:bold;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 24px #f0c04033}
    .hint{text-align:center;font-size:0.76rem;color:#5a5a80;margin-bottom:20px}
    .error-box{background:#2a1515;border:1px solid #e0555544;border-radius:10px;padding:14px;color:#e05555;font-size:0.84rem;margin-bottom:12px}
    .info-box{background:#1a1a28;border-radius:12px;padding:14px}
    .info-title{font-size:0.7rem;color:#7070a0;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.08em}
    .cat-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:#12121e;border-radius:10px;margin-bottom:6px}
    .cat-name{font-weight:700;font-size:0.8rem}
    .cat-subs{font-size:0.69rem;color:#7070a0;margin-top:2px}
    #loading{display:none;text-align:center;padding:70px 16px}
    .spinner{width:44px;height:44px;border:3px solid #2a2a3a;border-top:3px solid #f0c040;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading-msg{color:#a0a0c0;font-size:0.9rem}
    #result{display:none}
    .invoice-header{background:#1a1a28;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
    .resumen{background:#1a1a28;border-radius:12px;padding:14px;margin-bottom:12px}
    .resumen-title{font-size:0.7rem;color:#7070a0;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
    .resumen-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #ffffff08;font-size:0.84rem}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .summary-card{background:#1a1a28;border-radius:12px;padding:12px;text-align:center}
    .grupo{margin-bottom:14px}
    .grupo-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px 12px 0 0;font-weight:700;font-size:0.92rem}
    .grupo-body{background:#1a1a28;border-radius:0 0 12px 12px;padding:8px 8px 4px}
    .subcat{margin-bottom:6px}
    .subcat-header{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#1e1e2e;border-radius:10px 10px 0 0;cursor:pointer;user-select:none}
    .subcat-header.closed{border-radius:10px}
    .subcat-items{background:#1a1a28;border-radius:0 0 10px 10px;overflow:hidden}
    .subcat-items.closed{display:none}
    .subcat-subtotal{padding:7px 14px;background:#12121e;display:flex;justify-content:space-between}
    .item-row{padding:9px 14px;border-bottom:1px solid #ffffff06;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .item-nombre{font-size:0.83rem;font-weight:500;word-break:break-word}
    .item-det{font-size:0.72rem;color:#7070a0;margin-top:2px}
    .btn-nueva{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#f0c040;color:#111;border:none;border-radius:12px;padding:15px;font-size:1rem;font-weight:bold;cursor:pointer;margin-bottom:32px;box-shadow:0 4px 20px #f0c04033}
    .user-bar{background:#1a1a28;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:0.82rem}
    .user-bar img{width:32px;height:32px;border-radius:50%}
    .btn-logout{margin-left:auto;background:none;border:1px solid #3a3a55;color:#7070a0;border-radius:8px;padding:4px 10px;font-size:0.74rem;cursor:pointer}
    .file-list{background:#1a1a28;border-radius:12px;overflow:hidden;margin-bottom:14px}
    .file-list-title{padding:10px 14px;font-size:0.72rem;color:#7070a0;text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid #2a2a3a}
    .file-row{padding:12px 14px;border-bottom:1px solid #ffffff08;display:flex;align-items:center;gap:10px;cursor:pointer}
    .file-row:active{background:#ffffff08}
  </style>
</head>
<body>
<header>
  <h1>🧾 Analizador de Facturas</h1>
  <p>Facturas electrónicas Ecuador · SRI</p>
</header>
<main>
  <div id="upload-section">
    <div id="user-bar" style="display:none" class="user-bar">
      <img id="user-photo" src="" alt=""/>
      <div>
        <div id="user-name" style="font-weight:600;color:#e8e8f0"></div>
        <div id="user-email" style="color:#7070a0;font-size:0.74rem"></div>
      </div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
    <button id="btn-signin" class="btn-google" onclick="signIn()" style="display:none">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="24" height="24" alt="G"/>
      Iniciar sesión con Google
    </button>
    <button id="btn-drive" class="btn-drive" onclick="openDrivePicker()" style="display:none">
      <span style="font-size:1.4rem">📂</span> Seleccionar factura de Drive
    </button>
    <div id="loading-gsi" style="text-align:center;padding:20px;color:#7070a0;font-size:0.85rem">Cargando...</div>
    <p class="hint">Selecciona tu XML del SRI desde Google Drive</p>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div id="file-list-container"></div>
    <div class="info-box"><div class="info-title">Categorías</div><div id="cat-info"></div></div>
  </div>
  <div id="loading"><div class="spinner"></div><div id="loading-msg">Procesando...</div></div>
  <div id="result">
    <div class="invoice-header">
      <div>
        <div id="res-tienda" style="font-weight:700;color:#f0c040;font-size:0.92rem"></div>
        <div id="res-fecha" style="font-size:0.72rem;color:#7070a0;margin-top:2px"></div>
      </div>
      <div style="text-align:right">
        <div id="res-total" style="font-size:1.15rem;font-weight:bold;color:#f0c040"></div>
        <div style="font-size:0.66rem;color:#7070a0">total</div>
      </div>
    </div>
    <div class="resumen"><div class="resumen-title">Resumen</div><div id="resumen-rows"></div></div>
    <div class="summary-grid" id="summary-grid"></div>
    <div id="cat-results"></div>
    <button class="btn-nueva" onclick="nuevaFactura()">📂 Cargar otra factura</button>
  </div>
</main>
<script>
const CLIENT_ID="349130563975-2p6tjoest4ep2apd3fg3nsiqvjr81r88.apps.googleusercontent.com";
const SCOPES="https://www.googleapis.com/auth/drive.readonly";
const ESTRUCTURA=[
  {id:"ALIMENTICIO",label:"Alimenticio",icon:"🍽️",color:"#f0a050",subcats:[
    {id:"CARNES",label:"Carnes y Proteínas",icon:"🥩",color:"#e07055"},
    {id:"LACTEOS",label:"Lácteos y Huevos",icon:"🥛",color:"#a0c8ff"},
    {id:"GRANOS",label:"Granos y Harinas",icon:"🍚",color:"#d4a855"},
    {id:"FRUTAS",label:"Frutas y Verduras",icon:"🥦",color:"#50c878"},
  ]},
  {id:"ESTUDIOS",label:"Estudios",icon:"📚",color:"#7eb8f7",subcats:[
    {id:"UTILES",label:"Útiles escolares",icon:"✏️",color:"#fbbf24"},
    {id:"UNIFORMES",label:"Uniformes",icon:"👔",color:"#a78bfa"},
    {id:"LIBROS",label:"Libros",icon:"📖",color:"#60a5fa"},
    {id:"TECNOLOGIA",label:"Tecnología",icon:"💻",color:"#34d399"},
  ]},
  {id:"ROPA",label:"Ropa",icon:"👕",color:"#c084fc",subcats:[]},
  {id:"ASEO",label:"Aseo Personal",icon:"🧴",color:"#a78bfa",subcats:[]},
  {id:"LIMPIEZA",label:"Limpieza del Hogar",icon:"🧹",color:"#34d399",subcats:[]},
  {id:"GOLOSINA",label:"Golosinas",icon:"🍬",color:"#f87171",subcats:[]},
];
const fmt=n=>isNaN(n)?"—":`$${Number(n).toFixed(2)}`;
let tokenClient,accessToken;

// Cat info
const ci=document.getElementById("cat-info");
ESTRUCTURA.forEach(g=>{
  ci.innerHTML+=`<div class="cat-item" style="border:1px solid ${g.color}33"><span style="font-size:1rem;margin-top:1px">${g.icon}</span><div><div class="cat-name" style="color:${g.color}">${g.label}</div>${g.subcats.length?`<div class="cat-subs">${g.subcats.map(s=>`${s.icon} ${s.label}`).join(" · ")}</div>`:""}</div></div>`;
});

window.onload=()=>{
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleCredential,auto_select:false});
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){showError("Error auth: "+resp.error);return;}
      accessToken=resp.access_token;
      fetchXMLFiles();
    },
  });
  google.accounts.id.prompt(n=>{
    document.getElementById("loading-gsi").style.display="none";
    document.getElementById("btn-signin").style.display="flex";
  });
};

function handleCredential(resp){
  const p=JSON.parse(atob(resp.credential.split(".")[1]));
  document.getElementById("user-bar").style.display="flex";
  document.getElementById("btn-signin").style.display="none";
  document.getElementById("btn-drive").style.display="flex";
  document.getElementById("loading-gsi").style.display="none";
  document.getElementById("user-photo").src=p.picture||"";
  document.getElementById("user-name").textContent=p.name||"";
  document.getElementById("user-email").textContent=p.email||"";
}

function signIn(){google.accounts.id.prompt();}
function logout(){
  google.accounts.id.disableAutoSelect();accessToken=null;
  document.getElementById("user-bar").style.display="none";
  document.getElementById("btn-drive").style.display="none";
  document.getElementById("btn-signin").style.display="flex";
  document.getElementById("file-list-container").innerHTML="";
}

function openDrivePicker(){tokenClient.requestAccessToken();}

function fetchXMLFiles(){
  showSection("loading");
  document.getElementById("loading-msg").textContent="Buscando facturas XML en Drive...";
  fetch("https://www.googleapis.com/drive/v3/files?q=name+contains+'.xml'&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc&pageSize=30",
    {headers:{Authorization:"Bearer "+accessToken}})
  .then(r=>r.json())
  .then(data=>{
    showSection("upload");
    if(!data.files?.length){showError("No se encontraron archivos XML en Drive.");return;}
    renderFileList(data.files);
  })
  .catch(e=>{showSection("upload");showError("Error Drive: "+e.message);});
}

function renderFileList(files){
  const c=document.getElementById("file-list-container");
  let html=`<div class="file-list"><div class="file-list-title">Selecciona una factura</div>`;
  files.forEach(f=>{
    const fecha=new Date(f.modifiedTime).toLocaleDateString("es-EC");
    html+=`<div class="file-row" onclick="loadFile('${f.id}','${f.name.replace(/'/g,"\\'")}')">
      <span style="font-size:1.2rem">📄</span>
      <div style="flex:1;min-width:0"><div style="font-size:0.84rem;font-weight:500;word-break:break-word">${f.name}</div><div style="font-size:0.72rem;color:#7070a0;margin-top:2px">${fecha}</div></div>
      <span style="color:#f0c040;font-size:0.8rem">▶</span>
    </div>`;
  });
  c.innerHTML=html+"</div>";
}

function loadFile(fileId,fileName){
  showSection("loading");
  document.getElementById("loading-msg").textContent="Descargando "+fileName+"...";
  fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    {headers:{Authorization:"Bearer "+accessToken}})
  .then(r=>r.text())
  .then(xml=>{
    document.getElementById("loading-msg").textContent="Clasificando con IA...";
    const p=parseSRIxml(xml);
    if(!p.items_raw.length)throw new Error("No se encontraron productos en el XML");
    return clasificarConIA(p.items_raw,p.tienda,p.fecha).then(items=>({
      tienda:p.tienda,fecha:p.fecha,
      total_factura:p.total_factura||items.reduce((s,i)=>s+i.precio_total,0),items
    }));
  })
  .then(result=>{renderResult(result);showSection("result");})
  .catch(e=>{showSection("upload");showError("Error: "+e.message);});
}

function parseSRIxml(x){
  const doc=new DOMParser().parseFromString(x,"text/xml");
  const get=t=>doc.querySelector(t)?.textContent?.trim()||"";
  return{
    tienda:get("razonSocial")||get("nombreComercial")||"Emisor",
    fecha:get("fechaEmision")||"",
    total_factura:parseFloat(get("importeTotal")||"0"),
    items_raw:Array.from(doc.querySelectorAll("detalle")).map(d=>({
      nombre:d.querySelector("descripcion")?.textContent?.trim()||"Producto",
      cantidad:parseFloat(d.querySelector("cantidad")?.textContent||"1"),
      precioUnitario:parseFloat(d.querySelector("precioUnitario")?.textContent||"0"),
      precio_total:parseFloat(d.querySelector("precioTotalSinImpuesto")?.textContent||"0"),
    })),
  };
}

async function clasificarConIA(items,tienda,fecha){
  const lista=items.map((i,idx)=>`${idx+1}. ${i.nombre} (${i.cantidad} x $${i.precioUnitario.toFixed(2)} = $${i.precio_total.toFixed(2)})`).join("\n");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:
`Clasifica productos de supermercado ecuatoriano:
- CARNES: carnes,pollo,pescado,embutidos,atún,huevos
- LACTEOS: leche,queso,yogur,mantequilla
- GRANOS: arroz,fideo,pasta,harina,azúcar,sal,aceite,legumbres,avena,pan,vinagre,mostaza,salsa,mayonesa,café,té,anís,esencias
- FRUTAS: frutas,verduras
- UTILES: cuadernos,lápices,esferos,útiles escolares
- UNIFORMES: uniformes,ropa escolar
- LIBROS: libros,textos
- TECNOLOGIA: calculadoras,USB,tecnología
- ROPA: ropa,calzado adultos
- ASEO: champú,jabón personal,pasta dental,desodorante,papel higiénico,toallas sanitarias,pañales,cepillo,hilo dental
- LIMPIEZA: detergente,cloro,desinfectante,esponjas,fibras,guantes,jabón ropa,limpiacalzado
- GOLOSINA: chocolates,caramelos,galletas,snacks,papas fritas,chifles,refrescos,colas,alcohol,helados,gelatinas
Factura de "${tienda}" (${fecha}): ${lista}
SOLO JSON sin backticks: {"items":[{"nombre":"x","cantidad":1,"precioUnitario":0.00,"precio_total":0.00,"categoria":"GRANOS","razon":"razón"}]}`
    }]}),
  });
  if(!res.ok)throw new Error(`Error API: ${res.status}`);
  const data=await res.json();
  const raw=data.content.map(b=>b.text||"").join("");
  return JSON.parse(raw.replace(/```json|```/g,"").trim()).items;
}

function renderResult(result){
  const items=result.items||[];
  document.getElementById("res-tienda").textContent=result.tienda||"Factura";
  document.getElementById("res-fecha").textContent=result.fecha?"📅 "+result.fecha:"";
  document.getElementById("res-total").textContent=fmt(result.total_factura);
  const ALL=[];
  ESTRUCTURA.forEach(g=>{if(g.subcats.length>0)g.subcats.forEach(s=>ALL.push(s.id));else ALL.push(g.id);});
  const byId={};ALL.forEach(id=>{byId[id]=[];});
  items.forEach(item=>{const cat=item.categoria?.toUpperCase()||"GOLOSINA";if(byId[cat])byId[cat].push(item);else byId["GOLOSINA"].push(item);});
  const tp=id=>byId[id]?.reduce((s,i)=>s+(i.precio_total||0),0)||0;
  const tg=g=>g.subcats.length>0?g.subcats.reduce((s,sc)=>s+tp(sc.id),0):tp(g.id);
  const tEse=ESTRUCTURA.filter(g=>g.id!=="GOLOSINA").reduce((s,g)=>s+tg(g),0);
  const tGol=tp("GOLOSINA");const tGen=tEse+tGol;
  const pct=tGen>0?((tGol/tGen)*100).toFixed(1):0;
  const rr=document.getElementById("resumen-rows");rr.innerHTML="";
  ESTRUCTURA.forEach(g=>{const t=tg(g);if(!t)return;rr.innerHTML+=`<div class="resumen-row"><span>${g.icon} ${g.label}</span><span style="font-weight:700;color:${g.color}">${fmt(t)}</span></div>`;});
  rr.innerHTML+=`<div style="display:flex;justify-content:space-between;padding:7px 0 0;font-weight:800;color:#f0c040"><span>💰 TOTAL</span><span>${fmt(tGen)}</span></div>`;
  document.getElementById("summary-grid").innerHTML=[
    {l:"✅ Esenciales",v:fmt(tEse),c:"#50c878"},{l:"🍬 Golosinas",v:fmt(tGol),c:"#f87171"},
    {l:"📦 Productos",v:items.length,c:"#5599ff"},{l:"% golosinas",v:`${pct}%`,c:pct>30?"#f87171":pct>15?"#f0c040":"#50c878"},
  ].map(x=>`<div class="summary-card"><div style="font-size:0.66rem;color:#7070a0;margin-bottom:4px">${x.l}</div><div style="font-size:1.2rem;font-weight:bold;color:${x.c}">${x.v}</div></div>`).join("");
  const cr=document.getElementById("cat-results");cr.innerHTML="";
  ESTRUCTURA.forEach(g=>{
    const t=tg(g);if(!t)return;
    const makeRows=(its,color)=>its.map(item=>`<div class="item-row"><div style="flex:1;min-width:0"><div class="item-nombre">${item.nombre}</div><div class="item-det">${item.cantidad} × ${fmt(item.precioUnitario)}${item.razon?`<span style="color:#4a4a6a;margin-left:6px">· ${item.razon}</span>`:""}</div></div><div style="font-weight:700;color:${color};font-size:0.88rem;white-space:nowrap">${fmt(item.precio_total)}</div></div>`).join("");
    const makeSubcat=(sc)=>{const its=byId[sc.id];if(!its?.length)return"";const st=tp(sc.id);return`<div class="subcat"><div class="subcat-header" onclick="toggleSubcat(this)"><span>${sc.icon}</span><span style="font-weight:700;font-size:0.83rem;color:${sc.color}">${sc.label}</span><span style="background:${sc.color}22;color:${sc.color};border:1px solid ${sc.color}44;border-radius:20px;padding:1px 8px;font-size:0.7rem;font-weight:bold">${its.length}</span><span style="margin-left:auto;font-weight:800;font-size:0.86rem;color:${sc.color}">${fmt(st)}</span><span style="color:#7070a0;font-size:0.65rem">▲</span></div><div class="subcat-items">${makeRows(its,sc.color)}<div class="subcat-subtotal"><span style="font-size:0.7rem;color:#7070a0;text-transform:uppercase;letter-spacing:0.06em">Subtotal</span><span style="font-weight:800;color:${sc.color}">${fmt(st)}</span></div></div></div>`;};
    if(g.subcats.length>0){
      cr.innerHTML+=`<div class="grupo"><div class="grupo-header" style="background:${g.color}18;border:1px solid ${g.color}33"><span style="font-size:1.05rem">${g.icon}</span><span style="color:${g.color}">${g.label}</span><span style="margin-left:auto;color:${g.color};font-weight:800">${fmt(t)}</span></div><div class="grupo-body">${g.subcats.map(sc=>makeSubcat(sc)).join("")}</div></div>`;
    } else {
      const its=byId[g.id];if(!its?.length)return;
      cr.innerHTML+=`<div class="subcat"><div class="subcat-header" onclick="toggleSubcat(this)"><span>${g.icon}</span><span style="font-weight:700;font-size:0.83rem;color:${g.color}">${g.label}</span><span style="background:${g.color}22;color:${g.color};border:1px solid ${g.color}44;border-radius:20px;padding:1px 8px;font-size:0.7rem;font-weight:bold">${its.length}</span><span style="margin-left:auto;font-weight:800;font-size:0.86rem;color:${g.color}">${fmt(t)}</span><span style="color:#7070a0;font-size:0.65rem">▲</span></div><div class="subcat-items">${makeRows(its,g.color)}<div class="subcat-subtotal"><span style="font-size:0.7rem;color:#7070a0;text-transform:uppercase;letter-spacing:0.06em">Subtotal</span><span style="font-weight:800;color:${g.color}">${fmt(t)}</span></div></div></div>`;
    }
  });
}

function toggleSubcat(h){const i=h.nextElementSibling;const a=h.querySelector("span:last-child");const o=!i.classList.contains("closed");i.classList.toggle("closed",o);h.classList.toggle("closed",o);a.textContent=o?"▼":"▲";}
function showSection(id){document.getElementById("upload-section").style.display=id==="upload"?"block":"none";document.getElementById("loading").style.display=id==="loading"?"block":"none";document.getElementById("result").style.display=id==="result"?"block":"none";}
function showError(msg){const el=document.getElementById("error-box");el.textContent="⚠️ "+msg;el.style.display="block";}
function nuevaFactura(){document.getElementById("error-box").style.display="none";showSection("upload");openDrivePicker();}
</script>
</body>
</html>
